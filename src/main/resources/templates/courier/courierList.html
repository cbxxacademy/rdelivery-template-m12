<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Couriers List - Rocket Delivery</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="container my-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="mb-0">🏍️ Couriers Management</h1>
                <a href="/backoffice/couriers/new" class="btn btn-primary">➕ Add New Courier</a>
            </div>
            
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            
            <div th:if="${couriers != null and !couriers.isEmpty()}">
                <div class="card mb-3 border-0 shadow-sm">
                    <div class="card-body py-2">
                        <div class="text-center">
                            <strong>Total Couriers:</strong> 
                            <span class="badge bg-primary" th:text="${couriers.size()}">0</span>
                        </div>
                    </div>
                </div>
                
                <div class="card border-0 shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 5%;">ID</th>
                                    <th style="width: 15%;">User</th>
                                    <th style="width: 20%;">Address</th>
                                    <th style="width: 12%;">Status</th>
                                    <th style="width: 10%;">Phone</th>
                                    <th style="width: 13%;">Email</th>
                                    <th style="width: 5%;">Active</th>
                                    <th style="width: 20%;" class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="courier : ${couriers}">
                                    <td class="align-middle">
                                        <span class="badge bg-light text-dark" th:text="${courier.id}">1</span>
                                    </td>
                                    <td class="align-middle">
                                        <strong th:text="${courier.user.name}">User Name</strong>
                                    </td>
                                    <td class="align-middle">
                                        <span th:text="${courier.address.streetAddress + ', ' + courier.address.city}">Address</span>
                                    </td>
                                    <td class="align-middle">
                                        <span th:if="${courier.courierStatus.name == 'free'}" class="badge bg-success" th:text="${courier.courierStatus.name}">Status</span>
                                        <span th:if="${courier.courierStatus.name == 'busy'}" class="badge bg-warning text-dark" th:text="${courier.courierStatus.name}">Status</span>
                                        <span th:if="${courier.courierStatus.name == 'full'}" class="badge bg-danger" th:text="${courier.courierStatus.name}">Status</span>
                                        <span th:if="${courier.courierStatus.name == 'offline'}" class="badge bg-secondary" th:text="${courier.courierStatus.name}">Status</span>
                                    </td>
                                    <td class="align-middle">
                                        <span th:text="${courier.phone}">Phone</span>
                                    </td>
                                    <td class="align-middle">
                                        <span th:text="${courier.email ?: 'N/A'}">Email</span>
                                    </td>
                                    <td class="align-middle">
                                        <span th:if="${courier.active}" class="badge bg-success">Active</span>
                                        <span th:unless="${courier.active}" class="badge bg-danger">Inactive</span>
                                    </td>
                                    <td class="align-middle text-center">
                                        <div class="btn-group btn-group-sm" role="group">
                                            <a th:href="@{/backoffice/couriers/{id}(id=${courier.id})}" 
                                            class="btn btn-outline-info" title="View Details">👁️ View</a>
                                            <a th:href="@{/backoffice/couriers/{id}/edit(id=${courier.id})}" 
                                            class="btn btn-outline-warning" title="Edit Courier">✏️ Edit</a>
                                            <form th:action="@{/backoffice/couriers/{id}/delete(id=${courier.id})}" 
                                                method="post" style="display:inline;"
                                                onsubmit="return confirm('⚠️ Are you sure you want to delete this courier?\n\nThis action cannot be undone.');">
                                                <button type="submit" class="btn btn-outline-danger btn-sm" title="Delete Courier">🗑️ Delete</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div th:if="${couriers == null or couriers.isEmpty()}" class="text-center py-5">
                <div class="card border-0 shadow-sm">
                    <div class="card-body py-5">
                        <h3 class="text-muted mb-3">📭 No Couriers Found</h3>
                        <p class="text-muted mb-4">Get started by adding your first courier!</p>
                        <a href="/backoffice/couriers/new" class="btn btn-primary btn-lg">➕ Add New Courier</a>
                    </div>
                </div>
            </div>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
