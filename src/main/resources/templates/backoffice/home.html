<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home - Rocket Delivery</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="container my-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center py-5">
                    <h1 class="mb-3">🚀 Welcome to Rocket Delivery Backoffice</h1>
                    <p class="lead text-muted">
                        Logged in as: <strong th:text="${username}">user@email.com</strong>
                    </p>
                    <hr class="my-4">
                    <p class="text-muted">Use the navigation bar above to manage your data.</p>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
