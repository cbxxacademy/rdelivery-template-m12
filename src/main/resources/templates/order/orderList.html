<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Orders List - Rocket Delivery</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="container my-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="mb-0">🧾 Orders Management</h1>
                <a href="/backoffice/orders/new" class="btn btn-primary">➕ Add New Order</a>
            </div>
            
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            
            <div th:if="${orders != null and !orders.isEmpty()}">
                <div class="card mb-3 border-0 shadow-sm">
                    <div class="card-body py-2">
                        <div class="text-center">
                            <strong>Total Orders:</strong> 
                            <span class="badge bg-primary" th:text="${orders.size()}">0</span>
                        </div>
                    </div>
                </div>
                
                <div class="card border-0 shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 5%;">ID</th>
                                    <th style="width: 20%;">Restaurant</th>
                                    <th style="width: 20%;">Customer</th>
                                    <th style="width: 15%;">Status</th>
                                    <th style="width: 10%;">Rating</th>
                                    <th style="width: 30%;" class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="order : ${orders}">
                                    <td class="align-middle">
                                        <span class="badge bg-light text-dark" th:text="${order.id}">1</span>
                                    </td>
                                    <td class="align-middle">
                                        <strong th:text="${order.restaurant.name}">Restaurant</strong>
                                    </td>
                                    <td class="align-middle">
                                        <span th:text="${order.customer.user.name}">Customer</span>
                                    </td>
                                    <td class="align-middle">
                                        <span th:if="${order.orderStatus.name == 'pending'}" class="badge bg-warning text-dark" th:text="${order.orderStatus.name}">Status</span>
                                        <span th:if="${order.orderStatus.name == 'in progress'}" class="badge bg-info" th:text="${order.orderStatus.name}">Status</span>
                                        <span th:if="${order.orderStatus.name == 'delivered'}" class="badge bg-success" th:text="${order.orderStatus.name}">Status</span>
                                    </td>
                                    <td class="align-middle">
                                        <span th:if="${order.restaurantRating != null}" th:text="${order.restaurantRating + '/5'}">Rating</span>
                                        <span th:unless="${order.restaurantRating != null}" class="text-muted">N/A</span>
                                    </td>
                                    <td class="align-middle text-center">
                                        <div class="btn-group btn-group-sm" role="group">
                                            <a th:href="@{/backoffice/orders/{id}(id=${order.id})}" 
                                            class="btn btn-outline-info" title="View Details">👁️ View</a>
                                            <a th:href="@{/backoffice/orders/{id}/edit(id=${order.id})}" 
                                            class="btn btn-outline-warning" title="Edit Order">✏️ Edit</a>
                                            <form th:action="@{/backoffice/orders/{id}/delete(id=${order.id})}" 
                                                method="post" style="display:inline;"
                                                onsubmit="return confirm('⚠️ Are you sure you want to delete this order?\n\nThis action cannot be undone.');">
                                                <button type="submit" class="btn btn-outline-danger btn-sm" title="Delete Order">🗑️ Delete</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div th:if="${orders == null or orders.isEmpty()}" class="text-center py-5">
                <div class="card border-0 shadow-sm">
                    <div class="card-body py-5">
                        <h3 class="text-muted mb-3">📭 No Orders Found</h3>
                        <p class="text-muted mb-4">Get started by adding your first order!</p>
                        <a href="/backoffice/orders/new" class="btn btn-primary btn-lg">➕ Add New Order</a>
                    </div>
                </div>
            </div>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
