<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Order Details</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h3 class="mb-0">🧾 Order #<span th:text="${order.id}">ID</span></h3>
                        </div>
                        
                        <div class="card-body">
                            <h5 class="text-primary mb-3">🧾 Order Information</h5>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Restaurant</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:text="${order.restaurant.name}">Restaurant</span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Customer</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:text="${order.customer.user.name + ' (' + order.customer.phone + ')'}">Customer</span>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Order Status</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span th:if="${order.orderStatus.name == 'pending'}" class="badge bg-warning text-dark" th:text="${order.orderStatus.name}">Status</span>
                                        <span th:if="${order.orderStatus.name == 'in progress'}" class="badge bg-info" th:text="${order.orderStatus.name}">Status</span>
                                        <span th:if="${order.orderStatus.name == 'delivered'}" class="badge bg-success" th:text="${order.orderStatus.name}">Status</span>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Restaurant Rating</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span th:if="${order.restaurantRating != null}" th:text="${order.restaurantRating + '/5'}">Rating</span>
                                        <span th:unless="${order.restaurantRating != null}" class="text-muted">No rating</span>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Product Orders sub-table -->
                            <div th:if="${order.productOrders != null and !order.productOrders.isEmpty()}">
                                <hr class="my-4">
                                <h5 class="text-primary mb-3">📦 Order Items</h5>
                                <div class="table-responsive">
                                    <table class="table table-sm table-bordered">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Product</th>
                                                <th>Quantity</th>
                                                <th>Unit Cost</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="po : ${order.productOrders}">
                                                <td th:text="${po.product.name}">Product</td>
                                                <td th:text="${po.productQuantity}">Qty</td>
                                                <td th:text="'$' + ${po.productUnitCost}">Cost</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            
                            <hr class="my-4">
                            
                            <h5 class="text-primary mb-3">🕐 System Information</h5>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Record ID</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span class="badge bg-secondary" th:text="${order.id}">ID</span>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Created On</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span th:text="${#temporals.format(order.createdOn, 'yyyy-MM-dd HH:mm')}">Date</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Last Updated</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:text="${#temporals.format(order.updateOn, 'yyyy-MM-dd HH:mm')}">Date</span>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-2 mt-4">
                                <a href="/backoffice/orders" class="btn btn-secondary">← Back to List</a>
                                <a th:href="@{/backoffice/orders/{id}/edit(id=${order.id})}" class="btn btn-warning">✏️ Edit Order</a>
                                <form th:action="@{/backoffice/orders/{id}/delete(id=${order.id})}" 
                                    method="post" style="display:inline;"
                                    onsubmit="return confirm('⚠️ Are you sure you want to delete this order?\n\nThis action cannot be undone.');">
                                    <button type="submit" class="btn btn-danger">🗑️ Delete</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
