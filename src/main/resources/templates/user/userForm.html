<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="${user.id == 0 ? 'Create User' : 'Edit User'}">User Form</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h3 class="mb-0" th:text="${user.id == 0 ? '➕ Create New User' : '✏️ Edit User'}">
                                User Form
                            </h3>
                        </div>
                        
                        <div class="card-body">
                            <form th:action="${user.id == 0 ? '/backoffice/users' : '/backoffice/users/' + user.id}" 
                                th:object="${user}" method="post">
                                
                                <h5 class="text-primary mb-3">📋 User Information</h5>
                                
                                <!-- Name -->
                                <div class="mb-3">
                                    <label for="name" class="form-label fw-bold">
                                        Name <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control" id="name" th:field="*{name}" 
                                        required placeholder="e.g., John Doe"/>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                </div>
                                
                                <!-- Email (unique, not null) -->
                                <div class="mb-3">
                                    <label for="email" class="form-label fw-bold">
                                        Email <span class="text-danger">*</span>
                                    </label>
                                    <input type="email" class="form-control" id="email" th:field="*{email}" 
                                        required placeholder="john@example.com"/>
                                    <small class="text-muted">Must be unique across all users</small>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                </div>
                                
                                <!-- Password -->
                                <div class="mb-3">
                                    <label for="password" class="form-label fw-bold">
                                        Password <span class="text-danger">*</span>
                                    </label>
                                    <input type="password" class="form-control" id="password" th:field="*{password}" 
                                        required placeholder="Enter password"/>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                                </div>
                                
                                <hr class="my-4">
                                
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-success" 
                                        th:text="${user.id == 0 ? '✓ Create User' : '✓ Update User'}">Submit</button>
                                    <a href="/backoffice/users" class="btn btn-secondary">✗ Cancel</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
