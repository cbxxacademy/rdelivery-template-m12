<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>User Details</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h3 class="mb-0">👤 <span th:text="${user.name}">User Name</span></h3>
                        </div>
                        
                        <div class="card-body">
                            <h5 class="text-primary mb-3">📋 User Information</h5>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Name</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:text="${user.name}">Name</span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    📧 <span th:text="${user.email}">email@example.com</span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Password</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    🔒 <span class="text-muted">••••••••</span>
                                </div>
                            </div>
                            
                            <hr class="my-4">
                            
                            <h5 class="text-primary mb-3">🕐 System Information</h5>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Record ID</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span class="badge bg-secondary" th:text="${user.id}">ID</span>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Created On</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span th:text="${#temporals.format(user.createdOn, 'yyyy-MM-dd HH:mm')}">Date</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Last Updated</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:text="${#temporals.format(user.updateOn, 'yyyy-MM-dd HH:mm')}">Date</span>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-2 mt-4">
                                <a href="/backoffice/users" class="btn btn-secondary">← Back to List</a>
                                <a th:href="@{/backoffice/users/{id}/edit(id=${user.id})}" class="btn btn-warning">✏️ Edit User</a>
                                <form th:action="@{/backoffice/users/{id}/delete(id=${user.id})}" 
                                    method="post" style="display:inline;"
                                    onsubmit="return confirm('⚠️ Are you sure you want to delete this user?\n\nThis action cannot be undone.');">
                                    <button type="submit" class="btn btn-danger">🗑️ Delete</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
