<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="${address.id == 0 ? 'Create Address' : 'Edit Address'}">Address Form</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h3 class="mb-0" th:text="${address.id == 0 ? '➕ Create New Address' : '✏️ Edit Address'}">Address Form</h3>
                        </div>
                        
                        <div class="card-body">
                            <form th:action="${address.id == 0 ? '/backoffice/addresses' : '/backoffice/addresses/' + address.id}" 
                                th:object="${address}" method="post">
                                
                                <h5 class="text-primary mb-3">📍 Address Information</h5>
                                
                                <!-- Street Address (not null) -->
                                <div class="mb-3">
                                    <label for="streetAddress" class="form-label fw-bold">
                                        Street Address <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control" id="streetAddress" th:field="*{streetAddress}" 
                                        required placeholder="e.g., 123 Main Street"/>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('streetAddress')}" th:errors="*{streetAddress}"></div>
                                </div>
                                
                                <!-- City (not null) -->
                                <div class="mb-3">
                                    <label for="city" class="form-label fw-bold">
                                        City <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control" id="city" th:field="*{city}" 
                                        required placeholder="e.g., Montreal"/>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
                                </div>
                                
                                <!-- Postal Code (not null) -->
                                <div class="mb-3">
                                    <label for="postalCode" class="form-label fw-bold">
                                        Postal Code <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control" id="postalCode" th:field="*{postalCode}" 
                                        required placeholder="e.g., H2X 1Y4"/>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('postalCode')}" th:errors="*{postalCode}"></div>
                                </div>
                                
                                <hr class="my-4">
                                
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-success" 
                                        th:text="${address.id == 0 ? '✓ Create Address' : '✓ Update Address'}">Submit</button>
                                    <a href="/backoffice/addresses" class="btn btn-secondary">✗ Cancel</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
