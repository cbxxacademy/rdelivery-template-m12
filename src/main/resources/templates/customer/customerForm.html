<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="${customer.id == 0 ? 'Create Customer' : 'Edit Customer'}">Customer Form</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h3 class="mb-0" th:text="${customer.id == 0 ? '➕ Create New Customer' : '✏️ Edit Customer'}">Customer Form</h3>
                        </div>
                        
                        <div class="card-body">
                            <form th:action="${customer.id == 0 ? '/backoffice/customers' : '/backoffice/customers/' + customer.id}" 
                                th:object="${customer}" method="post">
                                
                                <h5 class="text-primary mb-3">🛒 Customer Information</h5>
                                
                                <!-- User (OneToOne, unique, not null) -->
                                <div class="mb-3">
                                    <label for="user" class="form-label fw-bold">
                                        User <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" id="user" th:field="*{user}" required>
                                        <option value="">-- Select User --</option>
                                        <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.name + ' (' + u.email + ')'}">User</option>
                                    </select>
                                    <div class="form-text text-muted">Each user can only be assigned to one customer.</div>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('user')}" th:errors="*{user}"></div>
                                </div>
                                
                                <!-- Address (ManyToOne, not null) -->
                                <div class="mb-3">
                                    <label for="address" class="form-label fw-bold">
                                        Address <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" id="address" th:field="*{address}" required>
                                        <option value="">-- Select Address --</option>
                                        <option th:each="a : ${addresses}" th:value="${a.id}" th:text="${a.streetAddress + ', ' + a.city + ' ' + a.postalCode}">Address</option>
                                    </select>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                                </div>
                                
                                <!-- Phone (not null) -->
                                <div class="mb-3">
                                    <label for="phone" class="form-label fw-bold">
                                        Phone <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control" id="phone" th:field="*{phone}" 
                                        required placeholder="e.g., 514-555-1234"/>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                                </div>
                                
                                <!-- Email (optional) -->
                                <div class="mb-3">
                                    <label for="email" class="form-label fw-bold">Email</label>
                                    <input type="email" class="form-control" id="email" th:field="*{email}" 
                                        placeholder="e.g., customer@example.com"/>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                </div>
                                
                                <!-- Active (default true) -->
                                <div class="mb-3">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="active" th:field="*{active}"/>
                                        <label class="form-check-label fw-bold" for="active">Active</label>
                                    </div>
                                </div>
                                
                                <hr class="my-4">
                                
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-success" 
                                        th:text="${customer.id == 0 ? '✓ Create Customer' : '✓ Update Customer'}">Submit</button>
                                    <a href="/backoffice/customers" class="btn btn-secondary">✗ Cancel</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
