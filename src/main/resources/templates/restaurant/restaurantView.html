<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Restaurant Details</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow">
                        <!-- Header - Same style as Form -->
                        <div class="card-header bg-primary text-white">
                            <h3 class="mb-0">🍔 <span th:text="${restaurant.name}">Restaurant Name</span></h3>
                        </div>
                        
                        <div class="card-body">
                            <!-- Basic Information Section -->
                            <h5 class="text-primary mb-3">📋 Basic Information</h5>
                            
                            <!-- Restaurant Name (Read-only version of form input) -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Restaurant Name</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:text="${restaurant.name}">Restaurant Name</span>
                                </div>
                            </div>
                            
                            <!-- Phone -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Phone Number</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    📞 <span th:text="${restaurant.phone}">Phone</span>
                                </div>
                            </div>
                            
                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    📧 <span th:text="${restaurant.email ?: 'Not provided'}">Email</span>
                                </div>
                            </div>
                            
                            <hr class="my-4">
                            
                            <!-- Owner & Location Section -->
                            <h5 class="text-primary mb-3">👤 Owner & Location</h5>
                            
                            <!-- Owner -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Owner</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:if="${restaurant.user != null}">
                                        <span th:text="${restaurant.user.name}">Owner Name</span>
                                        <small class="text-muted">(<span th:text="${restaurant.user.email}">email</span>)</small>
                                    </span>
                                    <span th:if="${restaurant.user == null}" class="text-muted">N/A</span>
                                </div>
                            </div>
                            
                            <!-- Address -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Address</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:if="${restaurant.address != null}">
                                        📍 <span th:text="${restaurant.address.streetAddress}">Street</span><br/>
                                        <span class="ms-3" th:text="${restaurant.address.city + ', ' + restaurant.address.postalCode}">City, Postal</span>
                                    </span>
                                    <span th:if="${restaurant.address == null}" class="text-muted">N/A</span>
                                </div>
                            </div>
                            
                            <hr class="my-4">
                            
                            <!-- Restaurant Settings Section -->
                            <h5 class="text-primary mb-3">⚙️ Restaurant Settings</h5>
                            
                            <!-- Price Range -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Price Range</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span class="text-warning fs-5" th:text="${'$'.repeat(restaurant.priceRange)}">$$</span>
                                    <small class="text-muted ms-2">
                                        (<span th:text="${restaurant.priceRange == 1 ? 'Budget Friendly' : (restaurant.priceRange == 2 ? 'Moderate' : 'Premium')}">Level</span>)
                                    </small>
                                </div>
                            </div>
                            
                            <!-- Active Status -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Status</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:class="${restaurant.active ? 'badge bg-success' : 'badge bg-secondary'}"
                                        th:text="${restaurant.active ? '✓ Active' : '✗ Inactive'}">
                                        Status
                                    </span>
                                </div>
                            </div>
                            
                            <hr class="my-4">
                            
                            <!-- System Information Section -->
                            <h5 class="text-primary mb-3">🕐 System Information</h5>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Record ID</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span class="badge bg-secondary" th:text="${restaurant.id}">ID</span>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Created On</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span th:text="${#temporals.format(restaurant.createdOn, 'yyyy-MM-dd HH:mm')}">Date</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Last Updated</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:text="${#temporals.format(restaurant.updateOn, 'yyyy-MM-dd HH:mm')}">Date</span>
                                </div>
                            </div>
                            
                            <!-- Action Buttons - Same as Form -->
                            <div class="d-flex gap-2 mt-4">
                                <a href="/backoffice/restaurants" class="btn btn-secondary">← Back to List</a>
                                <a th:href="@{/backoffice/restaurants/{id}/edit(id=${restaurant.id})}" class="btn btn-warning">✏️ Edit Restaurant</a>
                                <form th:action="@{/backoffice/restaurants/{id}/delete(id=${restaurant.id})}" 
                                    method="post" 
                                    style="display:inline;"
                                    onsubmit="return confirm('⚠️ Are you sure you want to delete this restaurant?\n\nThis action cannot be undone.');">
                                    <button type="submit" class="btn btn-danger">🗑️ Delete</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
