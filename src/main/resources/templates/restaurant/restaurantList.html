<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Restaurants List - Rocket Delivery</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="container my-4">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="mb-0">🍔 Restaurants Management</h1>
                <a href="/backoffice/restaurants/new" class="btn btn-primary">
                    ➕ Add New Restaurant
                </a>
            </div>
            
            <!-- Success/Error Messages -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            
            <!-- Restaurants Table -->
            <div th:if="${restaurants != null and !restaurants.isEmpty()}">
                <!-- Stats Card -->
                <div class="card mb-3 border-0 shadow-sm">
                    <div class="card-body py-2">
                        <div class="text-center">
                            <strong>Total Restaurants:</strong> 
                            <span class="badge bg-primary" th:text="${restaurants.size()}">0</span>
                        </div>
                    </div>
                </div>
                
                <!-- Restaurants Table (Simplified) -->
                <div class="card border-0 shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 5%;">ID</th>
                                    <th style="width: 25%;">Restaurant Name</th>
                                    <th style="width: 15%;">City</th>
                                    <th style="width: 15%;">Phone</th>
                                    <th style="width: 10%;">Price</th>
                                    <th style="width: 10%;">Status</th>
                                    <th style="width: 20%;" class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="restaurant : ${restaurants}">
                                    <!-- ID -->
                                    <td class="align-middle">
                                        <span class="badge bg-light text-dark" th:text="${restaurant.id}">1</span>
                                    </td>
                                    
                                    <!-- Restaurant Name -->
                                    <td class="align-middle">
                                        <strong th:text="${restaurant.name}">Restaurant Name</strong>
                                    </td>
                                    
                                    <!-- City -->
                                    <td class="align-middle">
                                        <span th:text="${restaurant.address != null ? restaurant.address.city : 'N/A'}">City</span>
                                    </td>
                                    
                                    <!-- Phone -->
                                    <td class="align-middle">
                                        <span th:text="${restaurant.phone}">Phone</span>
                                    </td>
                                    
                                    <!-- Price Range -->
                                    <td class="align-middle">
                                        <span class="text-warning" th:text="${#strings.repeat('$', restaurant.priceRange)}">$$</span>
                                    </td>
                                    
                                    <!-- Status -->
                                    <td class="align-middle">
                                        <span th:class="${restaurant.active ? 'badge bg-success' : 'badge bg-secondary'}"
                                            th:text="${restaurant.active ? 'Active' : 'Inactive'}">
                                            Active
                                        </span>
                                    </td>
                                    
                                    <!-- Actions -->
                                    <td class="align-middle text-center">
                                        <div class="btn-group btn-group-sm" role="group">
                                            <a th:href="@{/backoffice/restaurants/{id}(id=${restaurant.id})}" 
                                            class="btn btn-outline-info"
                                            title="View Details">
                                                👁️ View
                                            </a>
                                            <a th:href="@{/backoffice/restaurants/{id}/edit(id=${restaurant.id})}" 
                                            class="btn btn-outline-warning"
                                            title="Edit Restaurant">
                                                ✏️ Edit
                                            </a>
                                            <form th:action="@{/backoffice/restaurants/{id}/delete(id=${restaurant.id})}" 
                                                method="post" 
                                                style="display:inline;"
                                                onsubmit="return confirm('⚠️ Are you sure you want to delete this restaurant?\n\nThis action cannot be undone.');">
                                                <button type="submit" 
                                                        class="btn btn-outline-danger btn-sm"
                                                        title="Delete Restaurant">
                                                    🗑️ Delete
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <!-- Empty State -->
            <div th:if="${restaurants == null or restaurants.isEmpty()}" class="text-center py-5">
                <div class="card border-0 shadow-sm">
                    <div class="card-body py-5">
                        <h3 class="text-muted mb-3">📭 No Restaurants Found</h3>
                        <p class="text-muted mb-4">Get started by adding your first restaurant!</p>
                        <a href="/backoffice/restaurants/new" class="btn btn-primary btn-lg">
                            ➕ Add New Restaurant
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Bootstrap JS for alert dismissal -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
