<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="${orderStatus.id == 0 ? 'Create Order Status' : 'Edit Order Status'}">Order Status Form</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h3 class="mb-0" th:text="${orderStatus.id == 0 ? '➕ Create New Order Status' : '✏️ Edit Order Status'}">Order Status Form</h3>
                        </div>
                        
                        <div class="card-body">
                            <form th:action="${orderStatus.id == 0 ? '/backoffice/order-statuses' : '/backoffice/order-statuses/' + orderStatus.id}" 
                                th:object="${orderStatus}" method="post">
                                
                                <h5 class="text-primary mb-3">📋 Status Information</h5>
                                
                                <!-- Name (enum, not null) -->
                                <div class="mb-3">
                                    <label for="name" class="form-label fw-bold">
                                        Status Name <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control" id="name" th:field="*{name}" required
                                        placeholder="e.g., pending, in progress, delivered"/>
                                    <div class="form-text text-muted">Allowed values: pending, in progress, delivered</div>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                </div>
                                
                                <hr class="my-4">
                                
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-success" 
                                        th:text="${orderStatus.id == 0 ? '✓ Create Status' : '✓ Update Status'}">Submit</button>
                                    <a href="/backoffice/order-statuses" class="btn btn-secondary">✗ Cancel</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
