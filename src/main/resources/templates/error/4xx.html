<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Error ' + ${status ?: '4xx'} + ' - Client Error'">Client Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg">
                    <div class="card-body text-center p-5">
                        <div style="font-size: 100px;">⚠️</div>
                        <h1 class="display-1 fw-bold text-primary" th:text="${status ?: '4xx'}">4xx</h1>
                        <p class="text-muted text-uppercase small">Client Error</p>
                        <h2 class="mb-4" th:text="${error ?: 'Request Error'}">Request Error</h2>
                        
                        <div class="alert alert-info text-start" th:if="${message}">
                            <strong>Error Details:</strong>
                            <p class="mb-0" th:text="${message}">Something went wrong with your request.</p>
                        </div>
                        
                        <p th:unless="${message}">There was a problem processing your request. Please check your input and try again.</p>
                        
                        <p class="text-muted small" th:if="${path}">
                            <small>Requested: <span th:text="${path}"></span></small>
                        </p>
                        
                        <div class="d-flex gap-2 justify-content-center mt-4">
                            <a href="/backoffice/restaurants" class="btn btn-primary">🏠 Go to Home</a>
                            <a href="javascript:history.back()" class="btn btn-secondary">← Go Back</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
