<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Rocket Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg">
                    <div class="card-body text-center p-5">
                        <div style="font-size: 80px;">⚠️</div>
                        <h1 class="text-danger mb-3">Oops! Something went wrong</h1>
                        <p class="text-muted">
                            Error <span class="badge bg-danger" th:text="${status ?: '500'}">500</span>
                        </p>
                        
                        <div class="alert alert-light text-start border-start border-danger border-4">
                            <strong>What happened?</strong>
                            <p class="mb-0" th:text="${message ?: 'An unexpected error occurred. Please try again later.'}">
                                An unexpected error occurred.
                            </p>
                        </div>
                        
                        <!-- Show detailed error in development only -->
                        <div class="alert alert-warning text-start small" th:if="${trace != null}">
                            <strong>Technical Details (Development Mode):</strong>
                            <p class="mb-1" th:text="${error}">Error type</p>
                            <p class="mb-0"><small th:text="${path}">Request path</small></p>
                        </div>
                        
                        <a href="/backoffice/restaurants" class="btn btn-primary mt-3">🏠 Go to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
