<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Product Order Details</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h3 class="mb-0">📋 Product Order #<span th:text="${productOrder.id}">ID</span></h3>
                        </div>
                        
                        <div class="card-body">
                            <h5 class="text-primary mb-3">📋 Product Order Information</h5>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Order</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:text="'Order #' + ${productOrder.order.id} + ' - ' + ${productOrder.order.restaurant.name}">Order</span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Product</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:text="${productOrder.product.name + ' (' + productOrder.product.restaurant.name + ')'}">Product</span>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Quantity</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span th:text="${productOrder.productQuantity}">Qty</span>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Unit Cost</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span class="badge bg-success" th:text="'$' + ${productOrder.productUnitCost}">$0</span>
                                    </div>
                                </div>
                            </div>
                            
                            <hr class="my-4">
                            
                            <h5 class="text-primary mb-3">🕐 System Information</h5>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Record ID</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span class="badge bg-secondary" th:text="${productOrder.id}">ID</span>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Created On</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span th:text="${#temporals.format(productOrder.createdOn, 'yyyy-MM-dd HH:mm')}">Date</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Last Updated</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:text="${#temporals.format(productOrder.updateOn, 'yyyy-MM-dd HH:mm')}">Date</span>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-2 mt-4">
                                <a href="/backoffice/product-orders" class="btn btn-secondary">← Back to List</a>
                                <a th:href="@{/backoffice/product-orders/{id}/edit(id=${productOrder.id})}" class="btn btn-warning">✏️ Edit Product Order</a>
                                <form th:action="@{/backoffice/product-orders/{id}/delete(id=${productOrder.id})}" 
                                    method="post" style="display:inline;"
                                    onsubmit="return confirm('⚠️ Are you sure you want to delete this product order?\n\nThis action cannot be undone.');">
                                    <button type="submit" class="btn btn-danger">🗑️ Delete</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
