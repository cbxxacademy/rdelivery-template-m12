<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Employee Details</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h3 class="mb-0">👤 <span th:text="${employee.user.name}">Employee Name</span></h3>
                        </div>
                        
                        <div class="card-body">
                            <h5 class="text-primary mb-3">👤 Employee Information</h5>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">User</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:text="${employee.user.name + ' (' + employee.user.email + ')'}">User</span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Address</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:text="${employee.address.streetAddress + ', ' + employee.address.city + ' ' + employee.address.postalCode}">Address</span>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Phone</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span th:text="${employee.phone}">Phone</span>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Email</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span th:text="${employee.email ?: 'N/A'}">Email</span>
                                    </div>
                                </div>
                            </div>
                            
                            <hr class="my-4">
                            
                            <h5 class="text-primary mb-3">🕐 System Information</h5>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Record ID</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span class="badge bg-secondary" th:text="${employee.id}">ID</span>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Created On</label>
                                    <div class="form-control-plaintext border rounded p-2 bg-light">
                                        <span th:text="${#temporals.format(employee.createdOn, 'yyyy-MM-dd HH:mm')}">Date</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Last Updated</label>
                                <div class="form-control-plaintext border rounded p-2 bg-light">
                                    <span th:text="${#temporals.format(employee.updateOn, 'yyyy-MM-dd HH:mm')}">Date</span>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-2 mt-4">
                                <a href="/backoffice/employees" class="btn btn-secondary">← Back to List</a>
                                <a th:href="@{/backoffice/employees/{id}/edit(id=${employee.id})}" class="btn btn-warning">✏️ Edit Employee</a>
                                <form th:action="@{/backoffice/employees/{id}/delete(id=${employee.id})}" 
                                    method="post" style="display:inline;"
                                    onsubmit="return confirm('⚠️ Are you sure you want to delete this employee?\n\nThis action cannot be undone.');">
                                    <button type="submit" class="btn btn-danger">🗑️ Delete</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
